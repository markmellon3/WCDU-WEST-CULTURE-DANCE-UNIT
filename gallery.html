<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEST CULTURE DANCE UNITE - Gallery</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/webp" sizes="16x16" href="https://ik.imagekit.io/s95tumxuk/Gemini_Generated_Image_7xjzql7xjzql7xjz.png">
    <link rel="icon" type="image/webp" sizes="32x32" href="https://ik.imagekit.io/s95tumxuk/Gemini_Generated_Image_7xjzql7xjzql7xjz.png">
    <link rel="icon" type="image/webp" sizes="96x96" href="https://ik.imagekit.io/s95tumxuk/Gemini_Generated_Image_7xjzql7xjzql7xjz.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://ik.imagekit.io/s95tumxuk/Gemini_Generated_Image_7xjzql7xjzql7xjz.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #f0f0f0;
            line-height: 1.6;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.88)),
                        url('https://i.ibb.co/XvRyP5z/Whats-App-Image-2026-02-16-at-20-34-12.jpg') center/cover fixed;
            background-attachment: fixed;
        }

        /* Glass Header */
        header {
            background: rgba(15, 15, 15, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 64, 129, 0.15);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: clamp(1.9rem, 5vw, 2.4rem);
            font-weight: 700;
            color: #ff4081;
            letter-spacing: 2.5px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2.4rem;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -6px;
            left: 0;
            background: #ff4081;
            transition: width 0.4s ease;
        }

        .nav-links li a:hover,
        .nav-links li a.active {
            color: #ff4081;
        }

        .nav-links li a:hover::after,
        .nav-links li a.active::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-toggle .bar {
            width: 28px;
            height: 3px;
            background: white;
            transition: all 0.4s;
        }

        /* Hero */
        .gallery-hero {
            height: 75vh;
            min-height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .gallery-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.82));
        }

        .gallery-hero-content {
            position: relative;
            z-index: 2;
            max-width: 920px;
            padding: 0 5%;
        }

        .gallery-hero h1 {
            font-size: clamp(3.4rem, 8vw, 6.2rem);
            font-weight: 900;
            color: white;
            margin-bottom: 1.3rem;
        }

        .gallery-hero p {
            font-size: clamp(1.25rem, 4vw, 1.6rem);
            color: #e0e0e0;
        }

        /* Gallery */
        .gallery {
            padding: 10rem 5% 7rem;
            max-width: 1440px;
            margin: 0 auto;
        }

        .gallery h2 {
            text-align: center;
            font-size: clamp(2.5rem, 6vw, 3.4rem);
            color: #ff4081;
            margin-bottom: 5rem;
            font-weight: 700;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.8rem;
        }

        /* Glass Cards - Two per line on all screens */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.55);
            transition: all 0.5s ease;
            aspect-ratio: 4 / 4.6;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 25px 60px rgba(255, 64, 129, 0.3);
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .gallery-item:hover img,
        .gallery-item:hover video {
            transform: scale(1.12);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 25%, transparent 65%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem 1.6rem;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay h3 {
            font-size: 1.55rem;
            color: #ff4081;
            margin-bottom: 0.4rem;
        }

        .overlay p {
            font-size: 1.02rem;
            color: #ddd;
        }

        /* Video Play Button */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .play-btn {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s;
        }

        .play-btn::before {
            content: "▶";
            font-size: 4.8rem;
            color: white;
        }

        .video-wrapper:hover .play-btn {
            background: rgba(255,64,129,0.25);
        }

        /* Lightbox / Popup */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .lightbox-content {
            position: relative;
            max-width: 95%;
            max-height: 92vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        }

        .lightbox-media {
            width: 100%;
            max-height: 78vh;
            object-fit: contain;
        }

        .lightbox-info {
            padding: 1.8rem 2rem;
            color: white;
        }

        .lightbox-info h3 {
            font-size: 1.8rem;
            color: #ff4081;
            margin-bottom: 0.6rem;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 2010;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr); /* Two cards per line on mobile */
                gap: 1.4rem;
            }

            .gallery-item {
                aspect-ratio: 4 / 4.8;
            }

            .menu-toggle {
                display: flex;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(10,10,10,0.98);
                flex-direction: column;
                padding: 2rem 0;
                text-align: center;
                border-top: 1px solid #222;
            }

            .nav-links.active {
                display: flex;
            }

            .lightbox-content {
                max-width: 98%;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">WCDU</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="index.html#events">Events</a></li>
                <li><a href="Donation.html">Donation</a></li>
            </ul>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <section class="gallery-hero">
        <div class="gallery-hero-content">
            <h1>Gallery</h1>
            <p>Moments that move. Energy that ignites. Passion that unites.</p>
        </div>
    </section>

    <section class="gallery">
        <h2>Our Performances & Moments</h2>
        
        <div class="gallery-grid" id="gallery-grid">
            <!-- Dynamic content from Firebase -->
        </div>
    </section>

    <!-- Lightbox Popup -->
    <div class="lightbox" id="lightbox">
        <button class="close-btn" id="close-lightbox">&times;</button>
        <div class="lightbox-content" id="lightbox-content">
            <!-- Media and info will be injected here by JavaScript -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
        import { getDatabase, ref, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmEy3DcuhuSsPxQml332xalyQJVWLd4uw",
            authDomain: "wcdu-955cb.firebaseapp.com",
            projectId: "wcdu-955cb",
            storageBucket: "wcdu-955cb.firebasestorage.app",
            messagingSenderId: "381070884807",
            appId: "1:381070884807:web:e02f4e3e3e34399f50e3e2",
            measurementId: "G-2DXFQ992WK",
            databaseURL: "https://wcdu-955cb-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        getAnalytics(app);
        const db = getDatabase(app);

        const galleryRef = ref(db, 'gallery');

        onValue(query(galleryRef, orderByChild('createdAt')), (snapshot) => {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';

            if (!snapshot.exists()) {
                grid.innerHTML = '<p style="text-align:center; padding:5rem 1rem; color:#aaa; font-size:1.3rem;">No gallery items uploaded yet.</p>';
                return;
            }

            const items = [];
            snapshot.forEach(child => {
                items.push({ key: child.key, ...child.val() });
            });
            items.reverse();

            items.forEach(item => {
                const url = item.url || 'https://via.placeholder.com/400x500?text=No+Media';
                const title = item.title || 'Untitled';
                const desc = item.description || 'Dance moment';

                const isVideo = item.type === 'video' || /\.(mp4|webm|ogg)$/i.test(url);

                let mediaHTML = isVideo 
                    ? `<div class="video-wrapper">
                         <video class="gallery-video" preload="metadata" loop muted playsinline>
                           <source src="${url}" type="video/mp4">
                         </video>
                         <button class="play-btn" aria-label="Play video"></button>
                       </div>`
                    : `<img src="${url}" alt="${title}" loading="lazy">`;

                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    ${mediaHTML}
                    <div class="overlay">
                        <h3>${title}</h3>
                        <p>${desc}</p>
                    </div>
                `;

                // Open lightbox when clicking the card
                div.addEventListener('click', () => openLightbox(url, title, desc, isVideo));

                grid.appendChild(div);
            });
        });
    </script>

    <script>
        // Mobile menu
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');

        if (mobileMenu && navLinks) {
            mobileMenu.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        }

        // Lightbox functions
        const lightbox = document.getElementById('lightbox');
        const lightboxContent = document.getElementById('lightbox-content');
        const closeBtn = document.getElementById('close-lightbox');

        function openLightbox(url, title, desc, isVideo) {
            let mediaHTML = '';

            if (isVideo) {
                mediaHTML = `
                    <video class="lightbox-media" controls autoplay loop playsinline>
                        <source src="${url}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                `;
            } else {
                mediaHTML = `<img src="${url}" alt="${title}" class="lightbox-media">`;
            }

            lightboxContent.innerHTML = `
                ${mediaHTML}
                <div class="lightbox-info">
                    <h3>${title}</h3>
                    <p>${desc}</p>
                </div>
            `;

            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'visible';
        }

        closeBtn.addEventListener('click', closeLightbox);

        // Close lightbox when clicking outside the content
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Video play/pause inside cards (optional - still works)
        document.addEventListener('click', function(e) {
            const wrapper = e.target.closest('.video-wrapper');
            if (wrapper && !e.target.closest('.gallery-item')) { // prevent conflict with lightbox
                const video = wrapper.querySelector('.gallery-video');
                if (video) {
                    if (video.paused || video.ended) {
                        video.play();
                    } else {
                        video.pause();
                    }
                }
            }
        });
    </script>

    <footer>
        <p>© 2026 WEST CULTURE DANCE UNITE — All Rights Reserved</p>
    </footer>

</body>
</html>
